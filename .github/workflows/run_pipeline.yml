name: Run Funny Animal Reels Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline Mode'
        required: true
        default: 'ai'
        type: choice
        options:
          - ai
          - ffmpeg
      dry_run:
        description: 'Dry Run (Skip Google Drive Upload)'
        required: true
        type: boolean
        default: false

  # Optional: Run automatically every day at 12:00 UTC
  # schedule:
  #   - cron: '0 12 * * *'

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials securely
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      - name: Run Pipeline
        env:
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_API }}
          GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            MODE="--mode ${{ github.event.inputs.mode }}"
            if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
              DRY_RUN="--dry-run"
            else
              DRY_RUN=""
            fi
            python main.py $MODE $DRY_RUN
          else
            # Default for schedule
            python main.py --mode ai
          fi
